<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>BuildMate</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- Loading Screen -->

<div id="loading">

    <div class="loader">

        <img src="assets/logo.png"
        class="logo">

        <h1>BuildMate</h1>

        <p>Loading...</p>

        <div class="loading-bar">

            <div class="loading-progress"></div>

        </div>

    </div>

</div>

<!-- Main App -->

<div id="app" class="hidden">

<header>

<img src="assets/logo.png"
class="logo-small">

<h1>BuildMate</h1>

<p>Minecraft Bedrock Structure Viewer</p>

</header>

<main>

<button id="openBtn">

📂 Open Structure

</button>

<button id="settingsBtn">

⚙️ Settings

</button>

<button id="aboutBtn">

❤️ About

</button>

<div class="card">

<h2>Status</h2>

<p id="status">

🟢 Ready

</p>

</div>

<div class="card">

<h2>Structure</h2>

<p id="fileName">

No structure loaded

</p>

<p id="fileSize">

--

</p>

</div>

<input
type="file"
id="fileInput"
accept=".mcstructure"
hidden>

</main>

<footer>

BuildMate v1.0 Rebuild

</footer>

</div>

<script src="js/ui.js"></script>
<script src="js/file.js"></script>
<script src="js/parser.js"></script>
<script src="js/app.js"></script>

</body>

</html>
